# Configuración Redis para Restaurante IA Plataforma

# Configuración de red
bind 0.0.0.0
port 6379
timeout 300
tcp-keepalive 60

# Configuración de memoria
maxmemory 256mb
maxmemory-policy allkeys-lru

# Configuración de persistencia
save 900 1
save 300 10
save 60 10000

# Configuración de logging
loglevel notice
logfile ""

# Configuración de seguridad
protected-mode no

# Configuración de rendimiento
tcp-backlog 511
databases 16

# Configuración específica para la aplicación
# Cache de restaurantes (TTL: 1 hora)
# Cache de mesas (TTL: 5 minutos)
# Cache de reservas (TTL: 10 minutos)